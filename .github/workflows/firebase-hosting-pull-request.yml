name: Deploy to Firebase Hosting on PR
'on': pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ***REMOVED***
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: comsnets-website.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: comsnets-website
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: comsnets-website.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '515136416456'
          NEXT_PUBLIC_FIREBASE_APP_ID: '***REMOVED***'
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: G-WDJC6K8RWB
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_COMSNETS_WEBSITE }}'
          projectId: comsnets-website
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
