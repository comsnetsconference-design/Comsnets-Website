name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - production
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyDaMSOs9yDSBfsTgiEAx6CmjrV5VSTiQPc
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: comsnets-website.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: comsnets-website
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: comsnets-website.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '515136416456'
          NEXT_PUBLIC_FIREBASE_APP_ID: '1:515136416456:web:10e876fa34e4449d4b93fd'
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: G-WDJC6K8RWB
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_COMSNETS_WEBSITE }}'
          channelId: live
          projectId: comsnets-website
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
      - name: Deploy Firestore Rules
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_COMSNETS_WEBSITE }}
        run: |
          echo "$SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          npx -y firebase-tools deploy --only firestore:rules --project comsnets-website
          rm -f "$RUNNER_TEMP/sa.json"
